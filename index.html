<!DOCTYPE html>
<html>
<head>
  <title>FastFitHub Wallet</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0c;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    button {
      padding: 14px 22px;
      border-radius: 12px;
      background: #facc15;
      border: none;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <div>
    <h1>FastFitHub Wallet 🚀</h1>

    <button onclick="connectWallet()">
      Connect Wallet
    </button>

    <p id="address" style="margin-top:20px;color:#9ca3af"></p>
  </div>

  <script>
    async function connectWallet() {
      if (window.ethereum) {
        const accounts = await window.ethereum.request({
          method: 'eth_requestAccounts'
        });

        document.getElementById("address").innerText =
          "Connected: " + accounts[0];
      } else {
        alert("Open in MetaMask browser");
      }
    }
  </script>

</body>
</html>
