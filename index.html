<!DOCTYPE html>
<html>
<head>
  <title>FastFitHub Wallet</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0c;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 40px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg,#6366f1,#8b5cf6);
      color: white;
      font-size: 16px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>FastFitHub Wallet 🚀</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="card">
    <span>DOGE Balance</span>
    <span id="doge">--</span>
  </div>

  <div class="card">
    <span>HUBX Balance</span>
    <span>120 HUBX</span>
  </div>

  <div class="card">
    <span>BTC Rewards</span>
    <span>0.00004 BTC</span>
  </div>

  <p id="wallet" style="margin-top:15px;color:#888;"></p>

</div>

<script>
async function connectWallet() {
  if (!window.ethereum) {
    alert("Open in MetaMask browser");
    return;
  }

  const accounts = await window.ethereum.request({
    method: "eth_requestAccounts"
  });

  document.getElementById("wallet").innerText =
    "Connected: " + accounts[0];
}
</script>

</body>
</html>
