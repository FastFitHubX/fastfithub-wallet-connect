<div style="text-align:center">
  <h1>FastFitHub Wallet 🚀</h1>

  <button onclick="connectWallet()" 
    style="padding:14px 22px;border-radius:12px;background:#facc15;border:none;font-weight:bold;margin-top:20px">
    Connect Wallet
  </button>

  <p id="address" style="margin-top:20px;color:#9ca3af"></p>
</div>

<script>
  async function connectWallet() {
    try {
      if (window.ethereum) {
        const accounts = await window.ethereum.request({
          method: 'eth_requestAccounts'
        })

        document.getElementById("address").innerText =
          "Connected: " + accounts[0]

      } else {
        alert("No wallet found. Open in MetaMask browser.")
      }
    } catch (err) {
      alert("Connection failed")
    }
  }
</script>
