<!DOCTYPE html>
<html>
<head>
  <title>FastFitHub Wallet</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #6366f1;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <h1>FastFitHub Wallet 🚀</h1>

  <button onclick="connectWallet()">Connect Wallet</button>

  <p id="wallet"></p>

  <script>
    async function connectWallet() {
      if (!window.ethereum) {
        alert("Open in MetaMask browser");
        return;
      }

      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      document.getElementById("wallet").innerText =
        "Connected: " + accounts[0];
    }
  </script>

</body>
</html>
