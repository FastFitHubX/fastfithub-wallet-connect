<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 70%);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* LOGO */
    .logo-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
      border-radius: 30px;

      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);

      display: flex;
      justify-content: center;
      align-items: center;

      box-shadow:
        0 20px 60px rgba(212,175,55,0.15),
        inset 0 0 20px rgba(255,255,255,0.05);
    }

    .logo {
      width: 75px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
    }

    .powered {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 25px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      border: none;

      font-size: 15px;
      font-weight: 600;
      color: white;

      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size: 200% 100%;
      animation: shine 4s linear infinite;

      box-shadow: 0 12px 35px rgba(212,175,55,0.25);
      margin-bottom: 30px;
    }

    @keyframes shine {
      0% { background-position: 0% }
      100% { background-position: 200% }
    }

    /* ACTION CARDS */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
    }

    .action {
      flex: 1;
      padding: 18px;
      border-radius: 20px;

      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;

      font-size: 13px;
      color: #ddd;
    }

    .icon {
      font-size: 22px;
    }

    /* 🔥 BOTTOM NAV (LIKE YOUR REFERENCE) */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 420px;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(30px);

      border-radius: 40px;
      padding: 8px;

      display: flex;
      justify-content: space-between;
    }

    .nav-item {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 30px;
      font-size: 12px;
      color: #aaa;
    }

    .nav-item.active {
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-weight: 600;
    }

    .nav-icon {
      display: block;
      font-size: 18px;
      margin-bottom: 2px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <!-- CONNECT -->
  <button class="btn" onclick="connectWallet()">Connect Wallet</button>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action">
      <div class="icon">🔄</div>
      <span>Swap</span>
    </div>

    <div class="action">
      <div class="icon">📈</div>
      <span>Trade</span>
    </div>

    <div class="action">
      <div class="icon">💳</div>
      <span>Buy</span>
    </div>
  </div>

</div>

<!-- 🔥 BOTTOM NAV -->
<div class="bottom-nav">

  <div class="nav-item active">
    <span class="nav-icon">💼</span>
    Wallet
  </div>

  <div class="nav-item">
    <span class="nav-icon">📊</span>
    Trade
  </div>

  <div class="nav-item">
    <span class="nav-icon">💰</span>
    Earn
  </div>

  <div class="nav-item">
    <span class="nav-icon">📜</span>
    History
  </div>

</div>

<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
async function connectWallet() {
  try {
    if (window.ethereum) {
      await window.ethereum.request({ method: "eth_requestAccounts" });
      alert("Wallet Connected");
    } else {
      const provider = await window.EthereumProvider.init({
        projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
        chains: [1],
        showQrModal: true
      });

      await provider.connect();
      alert("Wallet Connected");
    }
  } catch (e) {
    console.log(e);
  }
}
</script>

</body>
</html>
