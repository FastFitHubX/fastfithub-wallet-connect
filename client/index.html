<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #f5f5f7;
      font-family: -apple-system;
    }

    .container {
      padding: 20px;
      max-width: 420px;
      margin: auto;
      text-align: center;
    }

    .logo {
      width: 80px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
    }

    .powered {
      font-size: 12px;
      color: #888;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg,#d4af37,#000);
      color: white;
      font-size: 16px;
    }

    .hidden {
      display: none;
    }

    /* Glass UI */
    .glass {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 15px;
      margin-top: 20px;
    }

    .token {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .token:last-child {
      border-bottom: none;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <!-- CONNECT -->
  <button class="btn" onclick="connectWallet()">Connect Wallet</button>

  <!-- WALLET DATA (HIDDEN INITIALLY) -->
  <div id="walletUI" class="hidden">

    <div class="glass">
      <div><b>Address:</b> <span id="address"></span></div>
    </div>

    <div class="glass">

      <div class="token">
        <span>HUBX</span>
        <span id="hubx">120</span>
      </div>

      <div class="token">
        <span>Dogecoin</span>
        <span id="doge">--</span>
      </div>

      <div class="token">
        <span>Bitcoin</span>
        <span id="btc">--</span>
      </div>

    </div>

  </div>

</div>

<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
async function connectWallet() {
  try {

    let account;

    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });
      account = accounts[0];
    } else {
      const provider = await window.EthereumProvider.init({
        projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
        chains: [1],
        showQrModal: true
      });

      await provider.connect();
      account = provider.accounts[0];
    }

    // ✅ SHOW UI AFTER CONNECT
    document.getElementById("walletUI").classList.remove("hidden");

    // ✅ SET ADDRESS
    document.getElementById("address").innerText =
      account.slice(0,6) + "..." + account.slice(-4);

    // 🔥 (NEXT STEP YOU WILL ADD REAL BALANCE HERE)

  } catch (e) {
    console.log(e);
  }
}
</script>

</body>
</html>
