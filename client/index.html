<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system;
      background:#000;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container {
      text-align:center;
      width:90%;
      max-width:360px;
    }

    .logo {
      width:90px;
      margin-bottom:20px;
    }

    .btn {
      width:100%;
      padding:16px;
      border:none;
      border-radius:30px;
      font-size:16px;
      font-weight:600;
      color:#fff;
      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size:200%;
      animation: shine 4s linear infinite;
    }

    @keyframes shine {
      0% { background-position:0% }
      100% { background-position:200% }
    }
  </style>
</head>

<body>

<div class="container">
  <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  <h2>HubX Wallet</h2>
  <p>Powered by FastFitHub</p>

  <button class="btn" id="connectBtn">Connect Wallet</button>
</div>

<script type="module">
import { createAppKit } from "https://esm.sh/@reown/appkit@1.7.7";

const appKit = createAppKit({
  projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
  networks: ["eip155:1"], // Ethereum mainnet
  metadata: {
    name: "HubX Wallet",
    description: "HubX Web3 Wallet",
    url: "https://hubxwallet.vercel.app",
    icons: ["https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png"]
  }
});

// 🔥 OPEN FULL SDK UI
document.getElementById("connectBtn").onclick = async () => {
  await appKit.open();
};

// 🔥 HANDLE CONNECTION
appKit.subscribeAccount((account) => {
  if (account?.address) {
    document.getElementById("connectBtn").innerText =
      account.address.slice(0,6) + "..." + account.address.slice(-4);
  }
});
</script>

</body>
</html>
