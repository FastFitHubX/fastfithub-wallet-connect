<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:-apple-system;
      background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 75%);
      color:#fff;

      display:flex;
      justify-content:center;
      align-items:center;

      min-height:100vh;
      padding:20px;
    }

    .container {
      width:100%;
      max-width:360px;
      text-align:center;
    }

    .logo-wrap {
      width:110px;
      height:110px;
      margin:0 auto 20px;
      border-radius:28px;

      display:flex;
      justify-content:center;
      align-items:center;

      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);

      box-shadow: 0 20px 60px rgba(212,175,55,0.15);
    }

    .logo { width:70px; }

    .title {
      font-size:24px;
      font-weight:700;
      margin-bottom:6px;
    }

    .powered {
      font-size:13px;
      color:#9a9a9a;
      margin-bottom:30px;
    }

    .btn {
      width:100%;
      padding:16px;
      border-radius:30px;
      border:none;

      font-size:16px;
      font-weight:600;

      color:white;

      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size:200% 100%;
      animation:shine 4s linear infinite;

      box-shadow:0 10px 30px rgba(212,175,55,0.25);
    }

    @keyframes shine {
      0% { background-position:0% }
      100% { background-position:200% }
    }

    .btn:active {
      transform:scale(0.96);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <button class="btn" id="connectBtn">Connect Wallet</button>

</div>

<!-- ✅ STABLE IMPORT (NO CDN FAIL) -->
<script type="module">
import EthereumProvider from "https://esm.sh/@walletconnect/ethereum-provider@2.8.0";

const btn = document.getElementById("connectBtn");

let provider;

btn.addEventListener("click", async () => {
  try {
    btn.innerText = "Connecting...";
    btn.disabled = true;

    provider = await EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true,
    });

    await provider.connect();

    const address = provider.accounts[0];

    btn.innerText =
      address.slice(0,6) + "..." + address.slice(-4);

  } catch (err) {
    console.error(err);

    btn.innerText = "Connect Wallet";
    btn.disabled = false;

    alert("Connection failed");
  }
});
</script>

</body>
</html>
