<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 420px;
    }

    /* 🔥 LOGO BLEND EFFECT */
    .logo-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 15px;
      border-radius: 30px;

      background: radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
      display: flex;
      justify-content: center;
      align-items: center;

      box-shadow: 0 20px 60px rgba(212,175,55,0.15);
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-top: 10px;
    }

    .powered {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 30px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg,#d4af37,#000);
      color: white;
      font-size: 16px;
      font-weight: 600;

      box-shadow: 0 15px 40px rgba(212,175,55,0.25);
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.96);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 LOGO WITH BLEND -->
  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png" />
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <button class="btn">Connect Wallet</button>

</div>

</body>
</html>
