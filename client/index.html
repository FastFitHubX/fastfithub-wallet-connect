<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 70%);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* 🔥 LOGO (PREMIUM GLASS BALANCE) */
    .logo-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;

      display: flex;
      justify-content: center;
      align-items: center;

      border-radius: 30px;

      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);

      box-shadow:
        0 20px 60px rgba(212,175,55,0.15),
        inset 0 0 20px rgba(255,255,255,0.05);

      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    .logo {
      width: 75px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
    }

    .powered {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 28px;
    }

    /* 🔥 CONNECT BUTTON */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 30px;
      border: none;

      font-size: 15px;
      font-weight: 600;
      color: white;

      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size: 200% 100%;
      animation: shine 4s linear infinite;

      box-shadow: 0 12px 35px rgba(212,175,55,0.25);
      margin-bottom: 25px;
    }

    @keyframes shine {
      0% { background-position: 0% }
      100% { background-position: 200% }
    }

    .btn:active {
      transform: scale(0.96);
    }

    /* 🔥 ACTION BUTTONS */
    .actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .action {
      flex: 1;
      padding: 14px;
      border-radius: 18px;

      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;

      font-size: 13px;
      color: #ddd;

      transition: 0.2s;
    }

    .action:active {
      transform: scale(0.95);
    }

    .icon {
      font-size: 20px;
    }

    /* DEPTH */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 35%;
      top: 0;
      background: radial-gradient(circle, rgba(212,175,55,0.08), transparent 70%);
    }

    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 40%;
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <!-- CONNECT -->
  <button class="btn" onclick="connectWallet()">Connect Wallet</button>

  <!-- ACTIONS -->
  <div class="actions">
    <div class="action">
      <div class="icon">🔄</div>
      <span>Swap</span>
    </div>

    <div class="action">
      <div class="icon">📈</div>
      <span>Trade</span>
    </div>

    <div class="action">
      <div class="icon">💳</div>
      <span>Buy</span>
    </div>
  </div>

</div>

<!-- WALLET CONNECT -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
async function connectWallet() {
  try {
    if (window.ethereum) {
      await window.ethereum.request({ method: "eth_requestAccounts" });
      alert("Wallet Connected");
    } else {
      const provider = await window.EthereumProvider.init({
        projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
        chains: [1],
        showQrModal: true
      });

      await provider.connect();
      alert("Wallet Connected");
    }
  } catch (e) {
    console.log(e);
  }
}
</script>

</body>
</html>
