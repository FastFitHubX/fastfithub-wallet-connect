<!DOCTYPE html>
<html>
<head>
  <title>Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  margin: 0;
  font-family: -apple-system;
  background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 70%);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* 🔥 LOGO GLOW + ANIMATION */
.logo-wrap {
  width: 130px;
  height: 130px;
  margin: 0 auto 20px;
  border-radius: 35px;

  display: flex;
  justify-content: center;
  align-items: center;

  background: radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
  box-shadow: 0 0 80px rgba(212,175,55,0.15);

  animation: pulseGlow 3s infinite ease-in-out;
}

@keyframes pulseGlow {
  0% { box-shadow: 0 0 40px rgba(212,175,55,0.1); }
  50% { box-shadow: 0 0 90px rgba(212,175,55,0.35); }
  100% { box-shadow: 0 0 40px rgba(212,175,55,0.1); }
}

.logo {
  width: 85px;
  border-radius: 20px;
}

/* TEXT */
.title {
  font-size: 24px;
  font-weight: 700;
}

.powered {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 40px;
}

/* 🔥 BUTTON WITH LIGHT SWEEP */
.btn {
  width: 100%;
  padding: 18px;
  border-radius: 40px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  color: white;

  background: linear-gradient(120deg,#d4af37,#000,#d4af37);
  background-size: 200% 100%;

  animation: shine 4s linear infinite;

  box-shadow: 0 20px 60px rgba(212,175,55,0.25);
}

@keyframes shine {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

.btn:active {
  transform: scale(0.96);
}

/* 🔥 DEPTH OVERLAY */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 40%;
  top: 0;
  background: radial-gradient(circle, rgba(212,175,55,0.08), transparent 70%);
}

body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 40%;
  bottom: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

    /* 🔥 LOGO BLEND EFFECT */
    .logo-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 15px;
      border-radius: 30px;

      background: radial-gradient(circle, rgba(212,175,55,0.25), transparent 70%);
      display: flex;
      justify-content: center;
      align-items: center;

      box-shadow: 0 20px 60px rgba(212,175,55,0.15);
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-top: 10px;
    }

    .powered {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 30px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg,#d4af37,#000);
      color: white;
      font-size: 16px;
      font-weight: 600;

      box-shadow: 0 15px 40px rgba(212,175,55,0.25);
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.96);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 LOGO WITH BLEND -->
  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png" />
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <button class="btn">Connect Wallet</button>

</div>

</body>
</html>
