<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet By FastFitHub</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0c;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(90deg,#6366f1,#8b5cf6);
      color: white;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .card {
      background: #111;
      padding: 18px;
      border-radius: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- TEXT LOGO (NO IMAGE ISSUE) -->
  <div class="logo">FF</div>

  <h1>HubX Wallet By FastFitHub</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

</div>

<!-- ✅ STABLE WalletConnect -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
async function connectWallet() {
  try {
    if (!window.EthereumProvider) {
      alert("Refresh page");
      return;
    }

    const provider = await window.EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true
    });

    await provider.enable();

    const acc = provider.accounts[0];
    const short = acc.slice(0,6) + "..." + acc.slice(-4);

    document.querySelector(".status").innerText = short;

  } catch (e) {
    alert("Connection failed");
    console.log(e);
  }
}
</script>

</body>
</html>
