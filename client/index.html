<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, system-ui;
      background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 75%);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;

      padding:
        env(safe-area-inset-top)
        20px
        env(safe-area-inset-bottom);
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      gap: 18px;
    }

    .logo-wrap {
      width: 110px;
      height: 110px;
      border-radius: 28px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);

      box-shadow: 0 20px 60px rgba(212,175,55,0.15);
    }

    .logo {
      width: 70px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
    }

    .powered {
      font-size: 13px;
      color: #9a9a9a;
      margin-top: -6px;
    }

    /* 🔥 BUTTON STYLING */
    w3m-button {
      margin-top: 20px;

      --w3m-accent: #d4af37;
      --w3m-border-radius-master: 30px;
      --w3m-font-family: -apple-system;

      width: 100%;
      max-width: 320px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <!-- 🔥 CLEAN CONNECT BUTTON -->
  <w3m-button />

</div>

<!-- 🔥 REOWN SDK -->
<script type="module">
import { createAppKit } from "https://esm.sh/@reown/appkit";
import { WagmiAdapter } from "https://esm.sh/@reown/appkit-adapter-wagmi";
import { mainnet } from "https://esm.sh/@reown/appkit/networks";

const projectId = "fc6f49c8d5951ff17e19d159f1dafe98";

const wagmiAdapter = new WagmiAdapter({
  projectId,
  networks: [mainnet]
});

createAppKit({
  adapters: [wagmiAdapter],
  projectId,
  networks: [mainnet],

  metadata: {
    name: "HubX Wallet",
    description: "FastFitHub Web3 Wallet",
    url: window.location.origin,
    icons: ["https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png"]
  }
});
</script>

</body>
</html>
