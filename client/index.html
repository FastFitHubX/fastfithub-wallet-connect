<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet By FastFitHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f0f10, #000);
      color: white;
      font-family: -apple-system;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 420px;
      text-align: center;
      padding: 20px 0;
    }

    /* ✅ FIXED LOGO */
    .logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin: 0 auto 10px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {transform: translateY(0);}
      50% {transform: translateY(-6px);}
    }

    h1 {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 25px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 18px;
      border: none;
      background: linear-gradient(135deg,#6d5cff,#8b5cf6);
      color: white;
      font-size: 16px;
      margin-bottom: 10px;
      box-shadow: 0 10px 30px rgba(139,92,246,0.4);
    }

    .tag {
      color: #777;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #aaa;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }

    /* ✅ PREMIUM BOTTOM NAV */
    .menu {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 420px;
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(12px);
      padding: 12px;
      border-radius: 20px;
      display: flex;
      justify-content: space-around;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .menu div {
      text-align: center;
      color: #aaa;
    }

    .menu div.active {
      color: #8b5cf6;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- ✅ YOUR REAL LOGO -->
  <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png" />

  <h1>HubX Wallet By FastFitHub</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="tag">
    Supports 600+ wallets • Auto detect enabled
  </div>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

</div>

<!-- ✅ BOTTOM NAV -->
<div class="menu">
  <div class="active">💼<br>Wallet</div>
  <div>📈<br>Trade</div>
  <div>💰<br>Earn</div>
  <div>📜<br>History</div>
</div>

<!-- WalletConnect -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
let provider;

async function connectWallet() {
  try {

    // ✅ Direct wallet (MetaMask etc.)
    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      updateUI(accounts[0]);
      return;
    }

    // ✅ WalletConnect fallback
    if (!provider) {
      provider = await window.EthereumProvider.init({
        projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
        chains: [1],
        showQrModal: true
      });
    }

    await provider.connect();

    updateUI(provider.accounts[0]);

  } catch (err) {
    console.log(err);
  }
}

function updateUI(address) {
  const short = address.slice(0,6) + "..." + address.slice(-4);
  document.querySelector(".status").innerText = short;
}
</script>

</body>
</html>
