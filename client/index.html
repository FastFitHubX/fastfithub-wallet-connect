<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet By FastFitHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f0f10, #000);
      color: white;
      font-family: -apple-system;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg,#6d5cff,#8b5cf6);
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      color: #aaa;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- ✅ TEMP LOGO FIX -->
  <div class="logo">FF</div>

  <h1>HubX Wallet By FastFitHub</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

</div>

<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
async function connectWallet() {
  try {

    // 🔥 MOBILE FIX (MetaMask / Trust Wallet)
    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      const short = accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);
      document.querySelector(".status").innerText = short;
      return;
    }

    // 🔥 WalletConnect fallback (600 wallets)
    if (!window.EthereumProvider) {
      alert("Refresh page");
      return;
    }

    const provider = await window.EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true
    });

    await provider.enable();

    const acc = provider.accounts[0];
    const short = acc.slice(0,6) + "..." + acc.slice(-4);

    document.querySelector(".status").innerText = short;

  } catch (e) {
    console.log(e);
    alert("Connection failed");
  }
}
</script>

</body>
</html>
