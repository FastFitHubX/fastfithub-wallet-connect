<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet By FastFitHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f0f10, #000);
      color: white;
      font-family: -apple-system;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 420px;
      text-align: center;
      animation: fadeUp 0.6s ease;
    }

    @keyframes fadeUp {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:translateY(0);}
    }

    .logo {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg,#6d5cff,#8b5cf6);
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }

    .tag {
      color: #777;
      font-size: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      color: #aaa;
    }

    .highlight {
      color: #facc15;
      font-weight: bold;
    }

    .menu {
      display:flex;
      justify-content:space-around;
      margin-top:20px;
      background:#111;
      padding:12px;
      border-radius:20px;
      font-size:14px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo">FF</div>

  <h1>HubX Wallet By FastFitHub</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="tag">
    Supports 600+ wallets • Auto detect enabled
  </div>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

  <!-- MENU -->
  <div class="menu">
    <div>💼 Wallet</div>
    <div>📈 Trade</div>
    <div>💰 Earn</div>
    <div>📜 History</div>
  </div>

</div>

<!-- WalletConnect -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
let provider;

async function connectWallet() {
  try {

    // ✅ 1. MetaMask / Trust Wallet (mobile direct)
    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      updateUI(accounts[0]);
      return;
    }

    // ✅ 2. WalletConnect (600+ wallets)
    if (!window.EthereumProvider) {
      console.log("WalletConnect not loaded yet");
      return;
    }

    if (!provider) {
      provider = await window.EthereumProvider.init({
        projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
        chains: [1],
        showQrModal: true
      });
    }

    await provider.connect();

    const accounts = provider.accounts;
    updateUI(accounts[0]);

  } catch (err) {
    console.log("ERROR:", err);
  }
}

function updateUI(address) {
  if (!address) return;

  const short = address.slice(0,6) + "..." + address.slice(-4);
  document.querySelector(".status").innerText = short;
}
</script>

</body>
</html>
