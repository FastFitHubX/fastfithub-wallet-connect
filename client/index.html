<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: radial-gradient(circle at 50% 25%, #1a1a1a, #000 75%);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    /* 🔥 LOGO (BALANCED + CLEAN) */
    .logo-wrap {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;

      border-radius: 28px;

      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);

      box-shadow:
        0 20px 50px rgba(212,175,55,0.12),
        inset 0 0 15px rgba(255,255,255,0.04);
    }

    .logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
    }

    /* TEXT */
    .title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .powered {
      font-size: 13px;
      color: #9a9a9a;
      margin-bottom: 32px;
    }

    /* 🔥 BUTTON (PERFECT MOBILE SIZE) */
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 32px;
      border: none;

      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.2px;

      color: white;

      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size: 200% 100%;
      animation: shine 4s linear infinite;

      box-shadow: 0 10px 30px rgba(212,175,55,0.25);
    }

    @keyframes shine {
      0% { background-position: 0% }
      100% { background-position: 200% }
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* DEPTH */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 40%;
      top: 0;
      background: radial-gradient(circle, rgba(212,175,55,0.06), transparent 70%);
    }

    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 45%;
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <!-- CONNECT -->
  <button class="btn">Connect Wallet</button>

</div>

</body>
</html>
