<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  margin: 0;
  font-family: -apple-system;
  background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 70%);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* 🔥 LOGO GLOW + ANIMATION */
.logo-wrap {
  width: 110px;
  height: 110px;
  margin: 0 auto 18px;

  display: flex;
  justify-content: center;
  align-items: center;

  /* ❌ REMOVE BACKGROUND BOX */
  background: none;

  /* ✅ SOFT GOLD GLOW ONLY */
  filter: drop-shadow(0 0 25px rgba(212,175,55,0.25))
          drop-shadow(0 0 60px rgba(212,175,55,0.12));

  animation: floatGlow 3s ease-in-out infinite;
}

/* 🔥 SUBTLE FLOAT EFFECT */
@keyframes floatGlow {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

.logo {
  width: 70px;
  height: 70px;
  object-fit: contain;

  /* ✅ CLEAN — NO BACKGROUND */
  background: transparent;
  border-radius: 0;
}

@keyframes pulseGlow {
  0% { box-shadow: 0 0 40px rgba(212,175,55,0.1); }
  50% { box-shadow: 0 0 90px rgba(212,175,55,0.35); }
  100% { box-shadow: 0 0 40px rgba(212,175,55,0.1); }
}

.logo {
  width: 85px;
  border-radius: 20px;
}

/* TEXT */
.title {
  font-size: 24px;
  font-weight: 700;
}

.powered {
  font-size: 13px;
  color: #aaa;
  margin-bottom: 40px;
}

/* 🔥 BUTTON WITH LIGHT SWEEP */
.btn {
  width: 100%;
  padding: 18px;
  border-radius: 40px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  color: white;

  background: linear-gradient(120deg,#d4af37,#000,#d4af37);
  background-size: 200% 100%;

  animation: shine 4s linear infinite;

  box-shadow: 0 20px 60px rgba(212,175,55,0.25);
}

@keyframes shine {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

.btn:active {
  transform: scale(0.96);
}

/* 🔥 DEPTH OVERLAY */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 40%;
  top: 0;
  background: radial-gradient(circle, rgba(212,175,55,0.08), transparent 70%);
}

body::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 40%;
  bottom: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

  </style>
</head>

<body>

<div class="container">

  <!-- 🔥 LOGO WITH BLEND -->
  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png" />
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <button class="btn">Connect Wallet</button>

</div>

</body>
</html>
