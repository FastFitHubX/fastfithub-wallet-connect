<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet By FastFitHub</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #111 0%, #000 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 420px;
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .logo {
      font-size: 40px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg,#6d5cff,#8b5cf6);
      color: white;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 25px;
      box-shadow: 0 10px 30px rgba(139,92,246,0.3);
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #888;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .highlight {
      color: #facc15;
      font-weight: 600;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- PREMIUM TEXT LOGO -->
  <div class="logo">FF</div>

  <h1>HubX Wallet By FastFitHub</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

</div>

<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
async function connectWallet() {
  try {
    const provider = await window.EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true
    });

    await provider.enable();

    const acc = provider.accounts[0];
    const short = acc.slice(0,6) + "..." + acc.slice(-4);

    document.querySelector(".status").innerText = short;

  } catch (e) {
    alert("Connection failed");
    console.log(e);
  }
}
</script>

</body>
</html>
