<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system;
      background: radial-gradient(circle at 50% 20%, #1a1a1a, #000 80%);
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container {
      width:90%;
      max-width:360px;
      text-align:center;
    }

    .logo {
      width:90px;
      margin-bottom:20px;
    }

    h1 {
      margin:0;
      font-size:26px;
    }

    p {
      color:#aaa;
      margin-bottom:30px;
    }

    .btn {
      width:100%;
      padding:16px;
      border:none;
      border-radius:30px;
      font-size:16px;
      font-weight:600;
      color:#fff;
      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size:200%;
      animation: shine 4s linear infinite;
      box-shadow:0 10px 30px rgba(212,175,55,0.3);
    }

    @keyframes shine {
      0% { background-position:0% }
      100% { background-position:200% }
    }
  </style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">

  <h1>HubX Wallet</h1>
  <p>Powered by FastFitHub</p>

  <button class="btn" onclick="connectWallet()">Connect Wallet</button>

</div>

<script type="module">
import EthereumProvider from "https://esm.sh/@walletconnect/ethereum-provider@2.8.0";

let wcProvider;

// INIT WALLETCONNECT (ONLY FOR DESKTOP)
async function initWC() {
  wcProvider = await EthereumProvider.init({
    projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
    chains: [1],
    showQrModal: true
  });
}

await initWC();

function isMobile() {
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}

window.connectWallet = async function () {
  const btn = document.querySelector(".btn");

  try {
    btn.innerText = "Connecting...";

    // ✅ 1. META MASK DIRECT (BEST FLOW)
    if (window.ethereum && window.ethereum.isMetaMask) {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      const address = accounts[0];

      btn.innerText =
        address.slice(0,6) + "..." + address.slice(-4);

      return;
    }

    // ✅ 2. MOBILE → REDIRECT TO METAMASK
    if (isMobile()) {
      window.location.href =
        "https://metamask.app.link/dapp/hubxwallet.vercel.app";
      return;
    }

    // ✅ 3. DESKTOP → WALLETCONNECT QR
    if (wcProvider.session) {
      await wcProvider.disconnect();
      await initWC();
    }

    await wcProvider.connect();

    const address = wcProvider.accounts[0];

    btn.innerText =
      address.slice(0,6) + "..." + address.slice(-4);

  } catch (err) {
    console.error(err);

    btn.innerText = "Connect Wallet";

    alert("Connection failed. Try MetaMask browser.");
  }
};
</script>

</body>
</html>
