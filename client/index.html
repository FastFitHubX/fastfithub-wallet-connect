<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: radial-gradient(circle at 50% 25%, #1a1a1a, #000 75%);
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    }

    .container {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .logo-wrap {
      width: 110px;
      height: 110px;
      margin: 0 auto 20px;
      border-radius: 28px;

      display: flex;
      justify-content: center;
      align-items: center;

      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);

      box-shadow: 0 20px 50px rgba(212,175,55,0.12);
    }

    .logo {
      width: 72px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .powered {
      font-size: 13px;
      color: #9a9a9a;
      margin-bottom: 32px;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 32px;
      border: none;

      font-size: 16px;
      font-weight: 600;

      color: white;

      background: linear-gradient(120deg,#d4af37,#000,#d4af37);
      background-size: 200% 100%;
      animation: shine 4s linear infinite;

      box-shadow: 0 10px 30px rgba(212,175,55,0.25);
    }

    @keyframes shine {
      0% { background-position: 0% }
      100% { background-position: 200% }
    }

    .btn:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo-wrap">
    <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">
  </div>

  <div class="title">HubX Wallet</div>
  <div class="powered">Powered by FastFitHub</div>

  <button class="btn" onclick="connectWallet()">Connect Wallet</button>

</div>

<!-- 🔥 WALLETCONNECT SDK -->
<script src="https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
let provider;

async function connectWallet() {
  const btn = document.querySelector(".btn");

  try {
    btn.innerText = "Connecting...";
    btn.disabled = true;

    // ✅ Wait for SDK
    if (!window.EthereumProvider) {
      console.log("SDK not loaded");
      alert("Network issue. Reload once.");
      btn.innerText = "Connect Wallet";
      btn.disabled = false;
      return;
    }

    provider = await window.EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true,
      metadata: {
        name: "HubX Wallet",
        description: "FastFitHub Web3 Wallet",
        url: window.location.origin,
        icons: ["https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png"]
      }
    });

    await provider.connect();

    const address = provider.accounts[0];

    btn.innerText =
      address.slice(0,6) + "..." + address.slice(-4);

  } catch (err) {
    console.error(err);

    btn.innerText = "Connect Wallet";
    btn.disabled = false;

    alert("Connection failed");
  }
}
</script>

</body>
</html>
