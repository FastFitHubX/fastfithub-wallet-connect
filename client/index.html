<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet By FastFitHub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(180deg, #ffffff, #f5f5f5);
      font-family: -apple-system;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 420px;
      text-align: center;
    }

    /* LOGO */
    .logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 16px;
      color: #111;
      margin-bottom: 20px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg,#d4af37,#000);
      color: white;
      font-size: 16px;
      margin-bottom: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .tag {
      color: #666;
      font-size: 12px;
      margin-bottom: 20px;
    }

    /* GLASS CARD */
    .card {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #333;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .highlight {
      color: #b8962e;
      font-weight: 600;
    }

    /* TOKENS */
    .tokens {
      margin-top: 15px;
    }

    .token {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px);
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .token span {
      font-weight: 600;
    }

    /* NAV */
    .menu {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 420px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(20px);
      padding: 12px;
      border-radius: 20px;
      display: flex;
      justify-content: space-around;
      font-size: 13px;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .menu div {
      text-align: center;
      color: #333;
    }

    .menu .active {
      color: #b8962e;
      font-weight: 600;
    }

  </style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png" />

  <h1>HubX Wallet By FastFitHub</h1>

  <button class="btn" onclick="connectWallet()">Connect Wallet</button>

  <div class="tag">Supports 600+ wallets • Auto detect enabled</div>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

  <!-- TOKENS -->
  <div class="tokens">

    <div class="token">
      <span>HUBX</span>
      <span>120</span>
    </div>

    <div class="token">
      <span>DOGE</span>
      <span>--</span>
    </div>

    <div class="token">
      <span>BTC</span>
      <span>--</span>
    </div>

  </div>

</div>

<!-- NAV -->
<div class="menu">
  <div class="active">💼<br>Wallet</div>
  <div>📈<br>Trade</div>
  <div>💰<br>Earn</div>
  <div>📜<br>History</div>
</div>

<!-- WalletConnect -->
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.8.0/dist/index.umd.min.js"></script>

<script>
let provider;

async function connectWallet() {
  try {

    if (window.ethereum) {
      const accounts = await window.ethereum.request({
        method: "eth_requestAccounts"
      });

      updateUI(accounts[0]);
      return;
    }

    provider = await window.EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true
    });

    await provider.connect();

    updateUI(provider.accounts[0]);

  } catch (err) {
    console.log(err);
  }
}

function updateUI(address) {
  const short = address.slice(0,6) + "..." + address.slice(-4);
  document.querySelector(".status").innerText = short;
}
</script>

</body>
</html>
