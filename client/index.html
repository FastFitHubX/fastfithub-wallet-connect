<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>

<script>
let provider;

async function connectWallet() {
  try {
    provider = await window.EthereumProvider.init({
      projectId: "fc6f49c8d5951ff17e19d159f1dafe98",
      chains: [1],
      showQrModal: true,
      metadata: {
        name: "HubX Wallet By FastFitHub",
        description: "Premium Fitness Powered Wallet",
        url: "https://hubxwallet.vercel.app",
        icons: ["https://upload.wikimedia.org/wikipedia/commons/3/36/Logo_placeholder.png"]
      }
    });

    await provider.enable();

    const accounts = provider.accounts;
    const short = accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

    document.querySelector(".status").innerText = short;

  } catch (err) {
    console.log(err);
  }
}
</script>

<body>

<div class="container">

  <!-- ✅ WORKING LOGO (replace later if needed) -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/Logo_placeholder.png" />

  <h1>FastFitHub Wallet</h1>

  <button class="btn" onclick="connectWallet()">
    Connect Wallet
  </button>

  <div class="card">
    <span>Status</span>
    <span class="highlight status">Not Connected</span>
  </div>

  <div class="card">
    <span>Membership</span>
    <span class="highlight">Elite</span>
  </div>

  <div class="card">
    <span>Rewards Engine</span>
    <span class="highlight">Active</span>
  </div>

</div>

<script>
async function connectWallet() {
  if (!window.ethereum) {
    alert("Open in MetaMask browser");
    return;
  }

  const accounts = await window.ethereum.request({
    method: "eth_requestAccounts"
  });

  const short = accounts[0].slice(0,6) + "..." + accounts[0].slice(-4);

  document.querySelector(".status").innerText = short;
}
</script>

</body>
</html>
