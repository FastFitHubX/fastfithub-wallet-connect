<!DOCTYPE html>
<html>
<head>
  <title>HubX Wallet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system;
      background:#000;
      color:#fff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box {
      text-align:center;
      width:90%;
      max-width:360px;
    }

    .logo {
      width:80px;
      margin-bottom:20px;
    }

    .btn {
      width:100%;
      padding:16px;
      border-radius:30px;
      border:none;
      font-weight:600;
      font-size:16px;
      background:linear-gradient(90deg,#d4af37,#000,#d4af37);
      color:#fff;
    }
  </style>
</head>

<body>

<div class="box">
  <img class="logo" src="https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png">

  <h2>HubX Wallet</h2>
  <p style="color:#aaa">Powered by FastFitHub</p>

  <!-- 🔥 REAL BUTTON -->
  <w3m-button />
</div>

<!-- 🔥 REOWN SDK -->
<script type="module">
import { createAppKit } from "https://esm.sh/@reown/appkit";
import { WagmiAdapter } from "https://esm.sh/@reown/appkit-adapter-wagmi";
import { mainnet } from "https://esm.sh/@reown/appkit/networks";

const projectId = "fc6f49c8d5951ff17e19d159f1dafe98";

const wagmiAdapter = new WagmiAdapter({
  projectId,
  networks: [mainnet]
});

createAppKit({
  adapters: [wagmiAdapter],
  projectId,
  networks: [mainnet],
  metadata: {
    name: "HubX Wallet",
    description: "FastFitHub Web3 Wallet",
    url: window.location.origin,
    icons: ["https://i.ibb.co/7x1v4ZqM/Photoroom-20250523-163646.png"]
  }
});
</script>

</body>
</html>
